<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CoolFix - AC Diagnostic Tool</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            bgDark: '#0B1120',
            bgCard: '#1E293B',
            cyanAccent: '#00D4FF',
          },
          fontFamily: {
            mono: ['"IBM Plex Mono"', 'monospace'],
            sans: ['"DM Sans"', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  
  <style>
    body { background-color: #0B1120; color: #FFFFFF; font-family: 'DM Sans', sans-serif; }
    .mono { font-family: 'IBM Plex Mono', monospace; }
  </style>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-bgDark text-white min-h-screen">
  <div id="root"></div>
  
  <script src="errorCodes.js"></script>
  <script type="text/babel" src="app.js"></script>
</body>
</html>
